{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="bed-stats"></div>
<div class="card p-0 overflow-hidden">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <h3 class="font-semibold text-gray-700">Bed Map</h3>
        <div class="flex gap-3 text-xs">
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-green-400 inline-block"></span> Free</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-400 inline-block"></span> Occupied</span>
        </div>
    </div>
    <div id="beds-grid" class="p-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('page-title').textContent    = 'Bed Management';
document.getElementById('page-subtitle').textContent = 'AI-powered bed allocation';

async function loadBeds() {
    const [beds, stats] = await Promise.all([apiFetch('/api/beds'), apiFetch('/api/beds/stats')]);
    if (stats) {
        document.getElementById('bed-stats').innerHTML = [
            { label:'Total Beds',    val: stats.total,        color:'blue' },
            { label:'Occupied',      val: stats.occupied,     color:'red' },
            { label:'Free',          val: stats.free,         color:'green' },
            { label:'Occupancy Rate',val: stats.occupancy_rate+'%', color:'purple' }
        ].map(s => `
            <div class="card flex items-center gap-4 p-4">
                <div class="w-10 h-10 bg-${s.color}-100 rounded-xl flex items-center justify-center">
                    <i class="fas fa-bed text-${s.color}-600"></i></div>
                <div><p class="text-xs text-gray-500">${s.label}</p>
                     <p class="text-xl font-bold">${s.val}</p></div>
            </div>`).join('');
    }
    if (beds) {
        document.getElementById('beds-grid').innerHTML = beds.map(b => `
            <div class="rounded-xl border-2 p-3 cursor-pointer transition-all ${b.is_occupied ? 'border-red-200 bg-red-50' : 'border-green-200 bg-green-50'}"
                 onclick="${b.is_occupied ? `releaseBed(${b.id})` : ''}">
                <div class="flex items-center justify-between mb-2">
                    <span class="font-bold text-sm text-gray-800">${b.bed_number}</span>
                    <span class="text-xs px-1.5 py-0.5 rounded-full ${b.is_occupied?'bg-red-200 text-red-700':'bg-green-200 text-green-700'}">${b.bed_type}</span>
                </div>
                <p class="text-xs text-gray-500">${b.ward}</p>
                ${b.patient ? `
                <div class="mt-2 pt-2 border-t border-gray-200">
                    <p class="text-xs font-medium text-gray-700">${b.patient.name}</p>
                    <span class="text-xs badge-${b.patient.severity_label}">${b.patient.severity_label}</span>
                </div>` : `<p class="text-xs text-green-600 mt-2 font-medium">Available</p>`}
                ${b.is_occupied ? `<button onclick="event.stopPropagation();releaseBed(${b.id})" class="mt-2 w-full text-xs bg-red-100 hover:bg-red-200 text-red-700 py-1 rounded">Release</button>` : ''}
            </div>`).join('');
    }
}

async function releaseBed(bedId) {
    if (!confirm('Release this bed?')) return;
    await apiFetch(`/api/beds/release/${bedId}`, { method: 'POST' });
    loadBeds();
}

document.addEventListener('DOMContentLoaded', loadBeds);
</script>
{% endblock %}
