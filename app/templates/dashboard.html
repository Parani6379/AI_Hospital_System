{% extends "base.html" %}
{% block content %}
<div id="dash-content">
    <!-- Stats Row -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="card flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-procedures text-blue-600 text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Total Patients</p>
                <p id="stat-total" class="text-2xl font-bold text-gray-800">—</p>
            </div>
        </div>
        <div class="card flex items-center gap-4">
            <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-ambulance text-red-600 text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Emergency</p>
                <p id="stat-emergency" class="text-2xl font-bold text-gray-800">—</p>
            </div>
        </div>
        <div class="card flex items-center gap-4">
            <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-bed text-green-600 text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Beds Free</p>
                <p id="stat-beds" class="text-2xl font-bold text-gray-800">—</p>
            </div>
        </div>
        <div class="card flex items-center gap-4">
            <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-bell text-orange-600 text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Alerts Today</p>
                <p id="stat-alerts" class="text-2xl font-bold text-gray-800">—</p>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="card">
            <h3 class="font-semibold text-gray-700 mb-4">Patient Status Distribution</h3>
            <canvas id="patientChart" height="200"></canvas>
        </div>
        <div class="card">
            <h3 class="font-semibold text-gray-700 mb-4">Bed Occupancy by Type</h3>
            <canvas id="bedChart" height="200"></canvas>
        </div>
    </div>

    <!-- Recent Alerts -->
    <div class="card">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold text-gray-700">Recent Vital Alerts</h3>
            <a href="/vitals" class="text-blue-600 text-sm hover:underline">View all →</a>
        </div>
        <div id="alerts-list" class="space-y-2 max-h-64 overflow-y-auto">
            <p class="text-gray-400 text-sm">Loading...</p>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    async function loadDashboard() {
        // Fetch both endpoints in parallel — analytics/dashboard for patient/alert stats,
        // beds/stats for the accurate per-type breakdown needed by the bed chart.
        const [stats, bedStats] = await Promise.all([
            apiFetch('/api/analytics/dashboard'),
            apiFetch('/api/beds/stats')
        ]);
        if (!stats) return;
        document.getElementById('stat-total').textContent = stats.patients.total;
        document.getElementById('stat-emergency').textContent = stats.patients.emergency;
        document.getElementById('stat-beds').textContent = stats.beds.free;
        document.getElementById('stat-alerts').textContent = stats.alerts.total;

        new Chart(document.getElementById('patientChart'), {
            type: 'doughnut',
            data: {
                labels: ['Admitted', 'Emergency', 'Discharged'],
                datasets: [{
                    data: [stats.patients.admitted, stats.patients.emergency, stats.patients.discharged],
                    backgroundColor: ['#3B82F6', '#EF4444', '#10B981']
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        // Use by_type from /api/beds/stats (not analytics/dashboard which doesn't include it)
        const bs = (bedStats && bedStats.by_type) || {};
        new Chart(document.getElementById('bedChart'), {
            type: 'bar',
            data: {
                labels: ['General', 'ICU', 'Emergency', 'Isolation'],
                datasets: [
                    { label: 'Occupied', data: [bs.general?.occupied || 0, bs.icu?.occupied || 0, bs.emergency?.occupied || 0, bs.isolation?.occupied || 0], backgroundColor: '#EF4444' },
                    { label: 'Free', data: [bs.general?.free || 0, bs.icu?.free || 0, bs.emergency?.free || 0, bs.isolation?.free || 0], backgroundColor: '#10B981' }
                ]
            },
            options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } } }
        });

        const alerts = await apiFetch('/api/vitals/alerts/recent');
        const list = document.getElementById('alerts-list');
        if (alerts && alerts.length > 0) {
            list.innerHTML = alerts.slice(0, 8).map(a => `
            <div class="flex items-start gap-3 p-3 bg-red-50 rounded-lg border border-red-100">
                <i class="fas fa-exclamation-triangle text-red-500 mt-0.5"></i>
                <div>
                    <p class="text-sm font-medium text-red-700">Patient #${a.patient_id}</p>
                    <p class="text-xs text-red-500">${a.alert_message || 'Abnormal vitals detected'}</p>
                    <p class="text-xs text-gray-400 mt-1">${new Date(a.recorded_at).toLocaleString()}</p>
                </div>
            </div>`).join('');
        } else {
            list.innerHTML = '<p class="text-green-600 text-sm"><i class="fas fa-check-circle mr-2"></i>No active alerts</p>';
        }
    }
    document.addEventListener('DOMContentLoaded', loadDashboard);
    document.getElementById('page-title').textContent = 'Dashboard';
    document.getElementById('page-subtitle').textContent = 'AI-powered hospital overview';
</script>
{% endblock %}
